<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <defs>
    <!-- 主要科技感渐变：青蓝 -->
    <linearGradient id="cyanGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00F0FF"/>
      <stop offset="100%" stop-color="#0066FF"/>
    </linearGradient>

    <!-- 次要科技感渐变：紫红 -->
    <linearGradient id="purpleGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#B300FF"/>
      <stop offset="100%" stop-color="#FF00CC"/>
    </linearGradient>

    <!-- 货币单位渐变：金色 -->
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#FF8C00"/>
    </linearGradient>

    <!-- 发光滤镜 -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <filter id="glowIntense" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- 外围轨道（API 聚合层） -->
  <g opacity="0.6">
    <ellipse cx="250" cy="230" rx="140" ry="50" fill="none" stroke="url(#purpleGradient)" stroke-width="1" stroke-dasharray="2 6" transform="rotate(25 250 230)"/>
    <ellipse cx="250" cy="230" rx="100" ry="35" fill="none" stroke="url(#cyanGradient)" stroke-width="1.5" stroke-dasharray="4 8" transform="rotate(-35 250 230)"/>
  </g>

  <!-- 数据流路径（中继网络） -->
  <g fill="none" stroke-width="2">
    <!-- 左侧流入 -->
    <path d="M 80 150 C 140 150, 180 200, 240 230" stroke="url(#cyanGradient)" stroke-dasharray="6 6" opacity="0.8"/>
    <path d="M 80 250 C 140 250, 180 250, 240 230" stroke="url(#purpleGradient)" stroke-dasharray="8 8" opacity="0.6"/>
    <path d="M 80 350 C 140 350, 180 260, 240 230" stroke="url(#cyanGradient)" stroke-dasharray="4 6" opacity="0.8"/>

    <!-- 右侧流出 -->
    <path d="M 260 230 C 320 200, 360 150, 420 150" stroke="url(#purpleGradient)" stroke-dasharray="8 8" opacity="0.8"/>
    <path d="M 260 230 C 320 230, 360 250, 420 250" stroke="url(#cyanGradient)" stroke-dasharray="6 6" opacity="0.6"/>
    <path d="M 260 230 C 320 260, 360 350, 420 350" stroke="url(#purpleGradient)" stroke-dasharray="4 6" opacity="0.8"/>
  </g>

  <!-- 外部节点（第三方 API） -->
  <g>
    <!-- 左侧节点 -->
    <circle cx="80" cy="150" r="6" fill="#0A0D14" stroke="url(#cyanGradient)" stroke-width="3"/>
    <circle cx="80" cy="250" r="6" fill="#0A0D14" stroke="url(#purpleGradient)" stroke-width="3"/>
    <circle cx="80" cy="350" r="6" fill="#0A0D14" stroke="url(#cyanGradient)" stroke-width="3"/>

    <!-- 右侧节点 -->
    <circle cx="420" cy="150" r="6" fill="#0A0D14" stroke="url(#purpleGradient)" stroke-width="3"/>
    <circle cx="420" cy="250" r="6" fill="#0A0D14" stroke="url(#cyanGradient)" stroke-width="3"/>
    <circle cx="420" cy="350" r="6" fill="#0A0D14" stroke="url(#purpleGradient)" stroke-width="3"/>

    <!-- 流动中的数据包 -->
    <circle cx="140" cy="175" r="3" fill="url(#cyanGradient)" filter="url(#glow)"/>
    <circle cx="180" cy="250" r="3" fill="url(#purpleGradient)" filter="url(#glow)"/>
    <circle cx="150" cy="310" r="3" fill="url(#cyanGradient)" filter="url(#glow)"/>

    <circle cx="320" cy="175" r="3" fill="url(#purpleGradient)" filter="url(#glow)"/>
    <circle cx="360" cy="250" r="3" fill="url(#cyanGradient)" filter="url(#glow)"/>
    <circle cx="340" cy="320" r="3" fill="url(#purpleGradient)" filter="url(#glow)"/>
  </g>

  <!-- 中心核心枢纽（聚合器 + 货币单位） -->
  <g>
    <!-- 核心发光背景 -->
    <circle cx="250" cy="230" r="55" fill="url(#cyanGradient)" opacity="0.1" filter="url(#glowIntense)"/>

    <!-- 中心圆环 -->
    <circle cx="250" cy="230" r="45" fill="#0A0D14" stroke="url(#cyanGradient)" stroke-width="2" stroke-dasharray="10 5"/>
    <circle cx="250" cy="230" r="35" fill="#141A29" stroke="url(#purpleGradient)" stroke-width="3"/>

    <!-- 货币单位：✧（四角星） -->
    <path d="M 250 190 L 262 218 L 290 230 L 262 242 L 250 270 L 238 242 L 210 230 L 238 218 Z" fill="url(#goldGradient)" filter="url(#glow)"/>

    <!-- 中心小圆点 -->
    <circle cx="250" cy="230" r="4" fill="#FFFFFF" opacity="0.9"/>
  </g>
</svg>
